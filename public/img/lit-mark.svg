<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LIT Nexus">
  <defs>
    <linearGradient id="litWarm" x1="0.2" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#F5822A"/>
      <stop offset="1" stop-color="#E22D1E"/>
    </linearGradient>
    <linearGradient id="litCool" x1="0.1" y1="0.05" x2="0.85" y2="1">
      <stop offset="0" stop-color="#3FBE7A"/>
      <stop offset="1" stop-color="#149B8C"/>
    </linearGradient>
    <linearGradient id="litTip" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#57CC6B"/>
      <stop offset="1" stop-color="#3FBE7A"/>
    </linearGradient>
  </defs>

  <!-- Green "N" + upward growth arrow (behind the L) -->
  <g>
    <!-- diagonal middle stroke of the N, emerging from the top of the L -->
    <path d="M47 30 L63 30 L90 100 L74 100 Z" fill="url(#litCool)"/>
    <!-- right leg / arrow shaft, rounded foot to echo the U -->
    <rect x="70" y="48" width="20" height="54" rx="6" fill="url(#litCool)"/>
    <!-- arrow head, centred over the shaft, brighter tip -->
    <path d="M80 14 L100 50 L60 50 Z" fill="url(#litTip)"/>
  </g>

  <!-- Orange-to-red "L" with a rounded U-style bottom (front-left) -->
  <path fill="url(#litWarm)"
        d="M28 36
           a8 8 0 0 1 8 -8
           h4
           a8 8 0 0 1 8 8
           v50
           h14
           a8 8 0 0 1 8 8
           v0
           a8 8 0 0 1 -8 8
           H36
           a8 8 0 0 1 -8 -8
           Z"/>
</svg>
