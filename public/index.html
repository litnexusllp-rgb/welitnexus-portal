<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIT Nexus Portal</title>
  <link rel="icon" type="image/svg+xml" href="/img/lit-mark.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/portal.css" />
</head>
<body>
  <!-- ================= LOGIN ================= -->
  <div class="login-wrap" id="loginWrap">
    <form class="login-card" id="loginForm">
      <img src="/img/lit-logo-color.png" alt="LIT Nexus — Loyalty Integrity Talent" class="login-logo" />
      <div class="sub">Employee Portal — sign in to continue</div>
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" required />
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required />
      <div class="err" id="loginErr"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px;">Sign in</button>
    </form>
  </div>

  <!-- ================= APP SHELL ================= -->
  <div class="app" id="app">
    <aside class="sidebar">
      <img src="/img/lit-logo-white.png" alt="LIT Nexus" class="sidebar-logo" />
      <nav id="nav">
        <button class="nav-item active" data-view="dashboard"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 9.6V20h12V9.6"/></svg></span> Dashboard</button>
        <button class="nav-item" data-view="clock"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></svg></span> Clock</button>
        <button class="nav-item" data-view="leaves"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8"/></svg></span> Leaves</button>
        <button class="nav-item" data-view="tasks"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3.5"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg></span> Tasks</button>
        <button class="nav-item admin-only" data-view="clients"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7.5a2 2 0 0 1 2-2h3l2 2h7a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/></svg></span> Clients</button>
        <button class="nav-item" data-view="achievements"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="5"/><path d="M9 13.2 7.5 21 12 18.2 16.5 21 15 13.2"/></svg></span> Achievements</button>
        <button class="nav-item" data-view="noticeboard"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11a2 2 0 0 1 2-2h2l9-4v14l-9-4H5a2 2 0 0 1-2-2z"/><path d="M8 15v4a1.5 1.5 0 0 0 3 0v-3"/></svg></span> Notice board</button>
        <button class="nav-item admin-only" data-view="trends"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16"/><path d="M7 15l3-4 3 3 4-6"/></svg></span> Trends</button>
        <button class="nav-item admin-only" data-view="kpi"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16"/><path d="M7 20v-5M12 20V8M17 20v-9"/></svg></span> KPIs</button>
        <button class="nav-item admin-only" data-view="reports"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16 10 10l4 4 6-7"/><path d="M16 7h4v4"/></svg></span> Reports</button>
        <button class="nav-item" data-view="calendar"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5.5" width="16" height="15" rx="2.5"/><path d="M4 10h16M8.5 3v4.5M15.5 3v4.5"/></svg></span> Holidays</button>
        <button class="nav-item" data-view="directory"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8.5" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 5.6a3.2 3.2 0 0 1 0 5.8M20.5 19a5.5 5.5 0 0 0-3.5-5.1"/></svg></span> Directory</button>
        <button class="nav-item admin-only" data-view="admin"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h9M19 7h1"/><path d="M4 17h7M17 17h3"/><circle cx="16" cy="7" r="2.2"/><circle cx="13" cy="17" r="2.2"/></svg></span> Admin</button>
      </nav>
      <button class="nav-item bell" id="bellBtn" aria-label="Notifications">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 0 0 4 0"/></svg></span>
        Notifications <span class="bell-badge" id="bellBadge" hidden>0</span>
      </button>
      <div class="spacer"></div>
      <div class="me">
        <div class="nm" id="meName">—</div>
        <div class="rl" id="meRole">—</div>
      </div>
      <button class="logout" id="changePwBtn" style="margin-bottom:8px;">Change password</button>
      <button class="logout" id="logoutBtn">Sign out</button>
    </aside>

    <main class="main" id="main"><!-- views injected by app.js --></main>
  </div>

  <!-- Modal + toast containers -->
  <div class="modal-bg" id="modalBg"><div class="modal" id="modal" tabindex="-1"></div></div>
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
